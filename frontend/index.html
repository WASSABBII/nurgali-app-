<!DOCTYPE html>
<html>
<head>
    <title>Nurgali Cloud App</title>
</head>
<body>
    <h1>Управление Redis</h1>
    
    <input type="text" id="itemName" placeholder="Введите имя">
    <button onclick="addItem()">Добавить в базу</button>

    <hr>
    <button onclick="loadData()">Обновить список</button>
    <ul id="list"></ul>

    <script>
        // ЗАМЕНИ ЭТУ ССЫЛКУ на свой адрес из Railway!
        const API_URL ="nurgali-app-production.up.railway.app";

        async function addItem() {
            const name = document.getElementById('itemName').value;
            // Отправляем данные на бэкенд
            await fetch(`${API_URL}/api/add?name=${name}`, { method: 'POST' });
            alert("Добавлено!");
            loadData();
        }

        async function loadData() {
            const response = await fetch(`${API_URL}/api/data`);
            const data = await response.json();
            const list = document.getElementById('list');
            list.innerHTML = "";
            data.items.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                list.appendChild(li);
            });
        }
    </script>
</body>
</html>
