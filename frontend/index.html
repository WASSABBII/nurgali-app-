<script>
    // 1. УКАЖИ ЗДЕСЬ СВОЮ ССЫЛКУ ИЗ RAILWAY (которую сгенерировал для бэкенда)
    const BACKEND_URL = window.location.hostname === 'localhost' 
        ? 'http://localhost:8080' 
        : 'https://backend-production.up.railway.app'; // <--- ЗАМЕНИ НА СВОЮ ССЫЛКУ

    async function loadData() {
        try {
            const res = await fetch(`${BACKEND_URL}/api/data`);
            const data = await res.json();
            const ul = document.getElementById('itemsUl');
            ul.innerHTML = '';
            data.items.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                ul.appendChild(li);
            });
        } catch (e) {
            console.error("Ошибка загрузки данных:", e);
        }
    }

    async function addItem() {
        const name = document.getElementById('itemName').value;
        if (!name) return;
        
        try {
            await fetch(`${BACKEND_URL}/api/add?name=${encodeURIComponent(name)}`, { 
                method: 'POST' 
            });
            document.getElementById('itemName').value = '';
            loadData();
        } catch (e) {
            console.error("Ошибка при добавлении:", e);
        }
    }

    loadData();
</script>
