version: '3.8'

services:
  # Наш API
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://db:6379
    depends_on:
      - db

  # Наш Веб-интерфейс
  frontend:
    build: ./frontend
    ports:
      - "80:80" # Откроется на обычном 80-м порту
    depends_on:
      - backend

  # Наша база данных
  db:
    image: redis:7-alpine
    ports:
      - "6379:6379"
